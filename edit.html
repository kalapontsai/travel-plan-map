<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>編輯景點</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
    
    .header {
      background: #e91e63;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 18px; }
    .back-btn { background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .back-btn:hover { background: rgba(255,255,255,0.3); }

    .container { padding: 20px; max-width: 800px; margin: 0 auto; }
    
    .card {
      background: #16213e;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #2196f3;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #333;
    }

    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 13px; color: #aaa; margin-bottom: 5px; }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #444;
      border-radius: 4px;
      font-size: 14px;
      background: #1a1a2e;
      color: #eee;
      font-family: inherit;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: #2196f7;
    }
    .form-group textarea { min-height: 120px; resize: vertical; }
    
    .form-row { display: flex; gap: 15px; }
    .form-row .form-group { flex: 1; }

    .btn-save {
      width: 100%;
      padding: 14px;
      background: #2196f3;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-save:hover { background: #1976d2; }

    .type-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 15px;
    }
    .type-badge.sightseeing { background: #2196f3; color: white; }
    .type-badge.hotel { background: #4caf50; color: white; }
    .type-badge.transport { background: #ff9800; color: white; }

    .seq-display { font-size: 24px; font-weight: bold; color: #2196f3; margin-bottom: 15px; }

    /* Mobile RWD */
    @media (max-width: 600px) {
      .form-row { flex-direction: column; gap: 0; }
      .container { padding: 15px; }
      .card { padding: 15px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 id="pageTitle">編輯景點</h1>
    <button class="back-btn" onclick="goBack()">返回</button>
  </div>

  <div class="container">
    <div class="card">
      <div class="type-badge" id="typeBadge">觀光</div>
      <div class="seq-display" id="seqDisplay">#1</div>

      <div class="form-group">
        <label>名稱</label>
        <input type="text" id="nameInput" placeholder="請輸入景點名稱">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>順序</label>
          <input type="number" id="seqInput" min="1" placeholder="順序">
        </div>
        <div class="form-group">
          <label>日期</label>
          <input type="date" id="dateInput">
        </div>
      </div>

      <div class="form-group">
        <label>地址</label>
        <input type="text" id="addressInput" placeholder="請輸入地址">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>電話</label>
          <input type="text" id="telInput" placeholder="請輸入電話">
        </div>
        <div class="form-group">
          <label>費用</label>
          <input type="text" id="costInput" placeholder="例如: 500">
        </div>
      </div>

      <div class="form-group">
        <label>座標 (Map URL)</label>
        <input type="text" id="mapUrlInput" placeholder="34.6937, 135.5023">
      </div>

      <div class="form-group">
        <label>備註</label>
        <textarea id="notesInput" placeholder="請輸入景點的詳細資訊、注意事項、開放時間等..."></textarea>
      </div>

      <button class="btn-save" onclick="saveItem()">儲存</button>
    </div>
  </div>

  <script>
    const DATA_KEY = 'osaka_travel_data';
    let itemData = { type: '', idx: 0 };

    const typeNames = { sightseeing: '觀光', hotel: '住宿', transport: '交通' };

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function init() {
      itemData.type = getQueryParam('type') || 'sightseeing';
      itemData.idx = parseInt(getQueryParam('idx') || '0');

      document.getElementById('typeBadge').textContent = typeNames[itemData.type];
      document.getElementById('typeBadge').className = 'type-badge ' + itemData.type;
      document.getElementById('seqDisplay').textContent = '#' + (getQueryParam('seq') || '?');
      document.getElementById('seqInput').value = getQueryParam('seq') || '';
      document.getElementById('dateInput').value = getQueryParam('date') || '';
      document.getElementById('nameInput').value = getQueryParam('name') || '';
      document.getElementById('addressInput').value = getQueryParam('address') || '';
      document.getElementById('telInput').value = getQueryParam('tel') || '';
      document.getElementById('costInput').value = getQueryParam('cost') || '';
      document.getElementById('mapUrlInput').value = getQueryParam('map_url') || '';
      document.getElementById('notesInput').value = getQueryParam('notes') || '';
    }

    function goBack() {
      window.location.href = 'index.html';
    }

    function saveItem() {
      const saved = localStorage.getItem(DATA_KEY);
      if (!saved) {
        alert('找不到資料，請從首頁進入');
        return;
      }

      try {
        const data = JSON.parse(saved);
        const item = data[itemData.type][itemData.idx];
        if (!item) {
          alert('找不到該項目');
          return;
        }

        item.seq = document.getElementById('seqInput').value;
        item.date = document.getElementById('dateInput').value;
        item.name = document.getElementById('nameInput').value;
        item.address = document.getElementById('addressInput').value;
        item.tel = document.getElementById('telInput').value;
        item.cost = document.getElementById('costInput').value;
        item.map_url = document.getElementById('mapUrlInput').value;
        item.notes = document.getElementById('notesInput').value;

        localStorage.setItem(DATA_KEY, JSON.stringify(data));
        alert('儲存成功');
        goBack();
      } catch (e) {
        alert('儲存失敗：' + e.message);
      }
    }

    init();
  </script>
</body>
</html>
