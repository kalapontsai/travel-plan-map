<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>大阪旅行規劃</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: #f5f5f5; }
    h1 { text-align: center; padding: 20px; background: #e91e63; color: white; }

    .container { display: flex; gap: 20px; padding: 20px; height: calc(100vh - 80px); }
    .left-panel { flex: 1; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
    .right-panel { flex: 1; min-width: 400px; }

    .section {
      background: white;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .section h2 {
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section.sightseeing h2 { color: #2196f3; border-color: #2196f3; }
    .section.hotel h2 { color: #4caf50; border-color: #4caf50; }
    .section.transport h2 { color: #ff9800; border-color: #ff9800; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { border: 1px solid #ddd; padding: 6px 4px; text-align: left; }
    th { background: #f0f0f0; font-weight: 600; }
    input[type="text"], input[type="number"], input[type="date"] {
      width: 100%; padding: 4px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px;
    }
    input[type="number"] { width: 50px; }
    input[name="map_url"] { width: 80px; }

    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-add { background: #2196f3; color: white; }
    .btn-del { background: #f44336; color: white; padding: 3px 8px; font-size: 11px; }
    .btn-import, .btn-export { position: relative; margin-top: 10px; background: #ff9800; color: white; padding: 10px 20px; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); border: none; border-radius: 4px; cursor: pointer; }

    #map { height: 100%; min-height: 500px; border-radius: 8px; }

    .marker-label {
      background: white;
      border: 2px solid;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    .sightseeing-marker { border-color: #2196f3; color: #2196f3; }
    .hotel-marker { border-color: #4caf50; color: #4caf50; }
    .transport-marker { border-color: #ff9800; color: #ff9800; }

    .empty-hint { text-align: center; color: #999; padding: 20px; font-size: 13px; }

    /* Mobile RWD */
    @media (max-width: 768px) {
      .container { flex-direction: column; height: auto; }
      .left-panel { flex: none; }
      .right-panel { flex: none; min-width: unset; }
      #map { height: 300px; }
      .btn-add { display: none; }
      .mobile-hide { display: none; }
      table { font-size: 13px; }
      th, td { padding: 4px 2px; }
    }
  </style>
</head>
<body>
  <h1>大阪旅行規劃</h1>

  <div class="container">
    <div class="left-panel">
      <div class="section sightseeing">
        <h2>觀光 <button class="btn btn-add" onclick="addRow('sightseeing')">+ 新增</button></h2>
        <table id="sightseeing-table">
          <thead>
            <tr>
              <th>順序</th>
              <th class="mobile-hide">日期</th>
              <th>名稱</th>
              <th>地址</th>
              <th class="mobile-hide">電話</th>
              <th class="mobile-hide">費用</th>
              <th class="mobile-hide">Map</th>
              <th class="mobile-hide"></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="section hotel">
        <h2>住宿 <button class="btn btn-add" onclick="addRow('hotel')">+ 新增</button></h2>
        <table id="hotel-table">
          <thead>
            <tr>
              <th>順序</th>
              <th class="mobile-hide">日期</th>
              <th>名稱</th>
              <th>地址</th>
              <th class="mobile-hide">電話</th>
              <th class="mobile-hide">費用</th>
              <th class="mobile-hide">Map</th>
              <th class="mobile-hide"></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="section transport">
        <h2>交通 <button class="btn btn-add" onclick="addRow('transport')">+ 新增</button></h2>
        <table id="transport-table">
          <thead>
            <tr>
              <th>順序</th>
              <th class="mobile-hide">日期</th>
              <th>名稱</th>
              <th>地址</th>
              <th class="mobile-hide">電話</th>
              <th class="mobile-hide">費用</th>
              <th class="mobile-hide">Map</th>
              <th class="mobile-hide"></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="right-panel">
      <div id="map"></div>
    </div>
  </div>

  <div style="padding: 10px 20px; display: flex; gap: 10px;">
    <button class="btn btn-import" onclick="importJSON()">匯入 JSON</button>
    <button class="btn btn-export" onclick="exportJSON()">匯出 JSON</button>
  </div>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(this)">

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const DATA_KEY = 'osaka_travel_data';

    const data = {
      sightseeing: [],
      hotel: [],
      transport: []
    };

    const map = L.map('map').setView([34.6937, 135.5023], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let markers = { sightseeing: [], hotel: [], transport: [] };

    function loadData() {
      // Always load from JSON file first, then override with localStorage if available
      fetch('osaka_travel_data.json')
        .then(r => r.json())
        .then(loaded => {
          Object.assign(data, loaded);
          // Merge with localStorage if exists (localStorage takes priority for user edits)
          const saved = localStorage.getItem(DATA_KEY);
          if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed.sightseeing) data.sightseeing = parsed.sightseeing;
            if (parsed.hotel) data.hotel = parsed.hotel;
            if (parsed.transport) data.transport = parsed.transport;
          }
          saveData();
          renderTable('sightseeing');
          renderTable('hotel');
          renderTable('transport');
          updateMap();
        })
        .catch(() => {
          // If JSON fails, try localStorage
          const saved = localStorage.getItem(DATA_KEY);
          if (saved) {
            const parsed = JSON.parse(saved);
            Object.assign(data, parsed);
            renderTable('sightseeing');
            renderTable('hotel');
            renderTable('transport');
            updateMap();
          }
        });
    }

    function saveData() {
      localStorage.setItem(DATA_KEY, JSON.stringify(data));
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length === 3) return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
      return dateStr;
    }

    function createMarkerIcon(type, label) {
      const colors = { sightseeing: '#2196f3', hotel: '#4caf50', transport: '#ff9800' };
      return L.divIcon({
        className: '',
        html: `<div class="marker-label ${type}-marker">${label}</div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 14]
      });
    }

    function updateMap() {
      // Clear existing markers
      Object.values(markers).forEach(group => group.forEach(m => map.removeLayer(m)));
      markers = { sightseeing: [], hotel: [], transport: [] };

      const allItems = [
        ...data.sightseeing.map(i => ({ ...i, category: 'sightseeing' })),
        ...data.hotel.map(i => ({ ...i, category: 'hotel' })),
        ...data.transport.map(i => ({ ...i, category: 'transport' }))
      ];

      const bounds = [];

      allItems.forEach(item => {
        if (!item.map_url || !item.map_url.trim()) return;
        const url = item.map_url.trim();
        const latlng = parseGeoUrl(url);
        if (!latlng) return;

        const label = item.category === 'sightseeing' ? formatDate(item.date) : (item.seq || '');
        const marker = L.marker(latlng, { icon: createMarkerIcon(item.category, label) })
          .addTo(map)
          .bindPopup(`<strong>${item.name}</strong><br>${item.address || ''}<br>${item.tel || ''}`);

        markers[item.category].push(marker);
        bounds.push(latlng);
      });

      if (bounds.length > 0) map.fitBounds(bounds, { padding: [30, 30] });
    }

    function parseGeoUrl(url) {
      // Handle Google Maps URL
      let match = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
      if (match) return [parseFloat(match[1]), parseFloat(match[2])];

      // Handle direct lat,lng format
      match = url.match(/^\s*(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/);
      if (match) return [parseFloat(match[1]), parseFloat(match[2])];

      return null;
    }

    function renderTable(type) {
      const tbody = document.querySelector(`#${type}-table tbody`);
      const items = data[type].sort((a, b) => (a.seq || 0) - (b.seq || 0));

      if (items.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="empty-hint">尚無資料</td></tr>`;
        return;
      }

      tbody.innerHTML = items.map((item, idx) => `
        <tr>
          <td><input type="number" value="${item.seq || ''}" onchange="updateField('${type}', ${idx}, 'seq', this.value)" min="1"></td>
          <td class="mobile-hide"><input type="date" value="${item.date || ''}" onchange="updateField('${type}', ${idx}, 'date', this.value)"></td>
          <td><input type="text" value="${item.name || ''}" placeholder="名稱" onchange="updateField('${type}', ${idx}, 'name', this.value)"></td>
          <td><input type="text" value="${item.address || ''}" placeholder="地址" onchange="updateField('${type}', ${idx}, 'address', this.value)"></td>
          <td class="mobile-hide"><input type="text" value="${item.tel || ''}" placeholder="電話" onchange="updateField('${type}', ${idx}, 'tel', this.value)"></td>
          <td class="mobile-hide"><input type="text" value="${item.cost || ''}" placeholder="費用" onchange="updateField('${type}', ${idx}, 'cost', this.value)"></td>
          <td class="mobile-hide"><input type="text" value="${item.map_url || ''}" placeholder="34.68,135.50" onchange="updateField('${type}', ${idx}, 'map_url', this.value)"></td>
          <td class="mobile-hide"><button class="btn btn-del" onclick="deleteRow('${type}', ${idx})">刪</button></td>
        </tr>
      `).join('');
    }

    function addRow(type) {
      const maxSeq = data[type].length > 0 ? Math.max(...data[type].map(i => i.seq || 0)) : 0;
      data[type].push({ seq: maxSeq + 1, date: '', name: '', address: '', tel: '', cost: '', map_url: '' });
      saveData();
      renderTable(type);
      updateMap();
    }

    function updateField(type, idx, field, value) {
      data[type][idx][field] = value;
      saveData();
      updateMap();
    }

    function deleteRow(type, idx) {
      data[type].splice(idx, 1);
      saveData();
      renderTable(type);
      updateMap();
    }

    function exportJSON() {
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'osaka_travel_plan.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importJSON() {
      document.getElementById('importFile').click();
    }

    function handleImport(el) {
      const file = el.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);
          if (imported.sightseeing) data.sightseeing = imported.sightseeing;
          if (imported.hotel) data.hotel = imported.hotel;
          if (imported.transport) data.transport = imported.transport;
          saveData();
          renderTable('sightseeing');
          renderTable('hotel');
          renderTable('transport');
          updateMap();
        } catch (err) {
          alert('JSON 格式錯誤：' + err.message);
        }
      };
      reader.readAsText(file);
      el.value = '';
    }

    // Initialize
    loadData();
  </script>
</body>
</html>
