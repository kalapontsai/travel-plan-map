<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>旅行規劃</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: #1a1a2e; color: #eee; }
    h1 { text-align: center; padding: 20px; background: #e91e63; color: white; }

    .container { display: flex; gap: 20px; padding: 20px; height: calc(100vh - 80px); }
    .left-panel { flex: 1; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
    .right-panel { flex: 1; min-width: 400px; }

    .section {
      background: #16213e;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    .section h2 {
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 10px;
    }
    .section.sightseeing h2 { color: #4fc3f7; border-color: #4fc3f7; }
    .section.hotel h2 { color: #81c784; border-color: #81c784; }
    .section.transport h2 { color: #ffb74d; border-color: #ffb74d; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { border: 1px solid #333; padding: 6px 4px; text-align: left; }
    th { background: #0f3460; font-weight: 600; }
    input[type="text"], input[type="number"], input[type="date"] {
      width: 100%; padding: 4px; border: 1px solid #444; border-radius: 4px; font-size: 13px;
      background: #1a1a2e;
      color: #eee;
    }
    input[type="number"] { width: 50px; }

    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-add { background: #4fc3f7; color: #1a1a2e; }
    .btn-del { background: #ef5350; color: white; padding: 3px 8px; font-size: 11px; }
    .btn-edit { background: #7c4dff; color: white; padding: 3px 8px; font-size: 11px; }
    .btn-import, .btn-export { position: relative; margin-top: 10px; background: #ff9800; color: white; padding: 10px 20px; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); border: none; border-radius: 4px; cursor: pointer; }

    #map { height: 100%; min-height: 500px; border-radius: 8px; filter: brightness(0.8) hue-rotate(180deg); }

    .marker-label {
      background: #1a1a2e;
      border: 2px solid;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    .sightseeing-marker { border-color: #4fc3f7; color: #4fc3f7; }
    .hotel-marker { border-color: #81c784; color: #81c784; }
    .transport-marker { border-color: #ffb74d; color: #ffb74d; }

    .current-location-marker { border-color: #9c27b0; color: #9c27b0; }

    .empty-hint { text-align: center; color: #666; padding: 20px; font-size: 13px; }

    /* Mobile RWD */
    @media (max-width: 768px) {
      .container { flex-direction: column; height: auto; }
      .left-panel { flex: none; overflow-x: auto; }
      .right-panel { flex: none; min-width: unset; }
      #map { height: 300px; }
      .mobile-hide { display: none; }
      table { font-size: 13px; min-width: 400px; }
      th, td { padding: 4px 2px; }
      .btn-add, .btn-edit { display: inline-block; }
      .current-location-btn { display: block !important; width: 100%; padding: 12px; font-size: 16px; margin-top: 10px; text-align: center; }
    }
    .current-location-btn { display: none; background: #9c27b0; color: white; }
    .current-location-marker { background: #9c27b0; border: 2px solid #9c27b0; color: white; }
    .leaflet-container { background: #1a1a2e; }
    .leaflet-popup-content-wrapper { background: #16213e; color: #eee; }
    .leaflet-popup-tip { background: #16213e; }
  </style>
</head>
<body>
  <h1>旅行規劃</h1>

  <div class="container">
    <div class="left-panel">
      <div class="section sightseeing">
        <h2>觀光 <button class="btn btn-add" onclick="addRow('sightseeing')">+ 新增</button></h2>
        <table id="sightseeing-table">
          <thead>
            <tr>
              <th>順序</th>
              <th>日期</th>
              <th>名稱</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="section hotel">
        <h2>住宿 <button class="btn btn-add" onclick="addRow('hotel')">+ 新增</button></h2>
        <table id="hotel-table">
          <thead>
            <tr>
              <th>順序</th>
              <th>日期</th>
              <th>名稱</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="section transport">
        <h2>交通 <button class="btn btn-add" onclick="addRow('transport')">+ 新增</button></h2>
        <table id="transport-table">
          <thead>
            <tr>
              <th>順序</th>
              <th>日期</th>
              <th>名稱</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="right-panel">
      <div id="map"></div>
    </div>
    <button class="btn current-location-btn" onclick="getCurrentLocation()">取得目前位置</button>
  </div>

  <div style="padding: 10px 20px; display: flex; gap: 10px;">
    <button class="btn btn-import" onclick="importJSON()">匯入 JSON</button>
    <button class="btn btn-export" onclick="exportJSON()">匯出 JSON</button>
  </div>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(this)">

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const DATA_KEY = 'osaka_travel_data';

    const data = {
      sightseeing: [],
      hotel: [],
      transport: []
    };

    const map = L.map('map').setView([34.6937, 135.5023], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let markers = { sightseeing: [], hotel: [], transport: [], currentLocation: null };
    let currentLocationMarker = null;

    function loadData() {
      fetch('travel_plan.json')
        .then(r => r.json())
        .then(loaded => {
          Object.assign(data, loaded);
          const saved = localStorage.getItem(DATA_KEY);
          if (saved) {
            try {
              const parsed = JSON.parse(saved);
              if (parsed.sightseeing) data.sightseeing = parsed.sightseeing;
              if (parsed.hotel) data.hotel = parsed.hotel;
              if (parsed.transport) data.transport = parsed.transport;
            } catch(e) {}
          }
          saveData();
          renderTable('sightseeing');
          renderTable('hotel');
          renderTable('transport');
          updateMap();
        })
        .catch((e) => {
          console.error('JSON load error:', e);
          const saved = localStorage.getItem(DATA_KEY);
          if (saved) {
            try {
              const parsed = JSON.parse(saved);
              Object.assign(data, parsed);
              renderTable('sightseeing');
              renderTable('hotel');
              renderTable('transport');
              updateMap();
            } catch(e2) {
              alert('無法讀取資料');
            }
          }
        });
    }

    function saveData() {
      localStorage.setItem(DATA_KEY, JSON.stringify(data));
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length === 3) return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
      return dateStr;
    }

    function createMarkerIcon(type, label) {
      return L.divIcon({
        className: '',
        html: `<div class="marker-label ${type}-marker">${label}</div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 14]
      });
    }

    function getCurrentLocation() {
      if (!navigator.geolocation) {
        alert('您的瀏覽器不支援定位功能');
        return;
      }
      
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const accuracy = position.coords.accuracy;
          
          if (currentLocationMarker) {
            map.removeLayer(currentLocationMarker);
          }
          
          currentLocationMarker = L.marker([lat, lng], {
            icon: L.divIcon({
              className: '',
              html: '<div class="marker-label current-location-marker" style="width:36px;height:36px;font-size:14px;">&#9679;</div>',
              iconSize: [36, 36],
              iconAnchor: [18, 18]
            })
          }).addTo(map)
          .bindPopup(`<strong>目前位置</strong><br>緯度: ${lat.toFixed(6)}<br>經度: ${lng.toFixed(6)}<br>精度: ${accuracy.toFixed(0)}m`)
          .openPopup();
          
          map.setView([lat, lng], 15);
        },
        (error) => {
          let msg = '定位失敗';
          switch(error.code) {
            case 1: msg = '請給予定位權限'; break;
            case 2: msg = '無法取得位置'; break;
            case 3: msg = '定位逾時'; break;
          }
          alert(msg);
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    function updateMap() {
      if (markers) {
        Object.values(markers).forEach(group => {
          if (Array.isArray(group)) group.forEach(m => map.removeLayer(m));
        });
      }
      markers = { sightseeing: [], hotel: [], transport: [], currentLocation: null };

      const allItems = [
        ...data.sightseeing.map(i => ({ ...i, category: 'sightseeing' })),
        ...data.hotel.map(i => ({ ...i, category: 'hotel' })),
        ...data.transport.map(i => ({ ...i, category: 'transport' }))
      ];

      const bounds = [];

      allItems.forEach(item => {
        if (!item.map_url || !item.map_url.trim()) return;
        const url = item.map_url.trim();
        const latlng = parseGeoUrl(url);
        if (!latlng) return;

        const label = item.category === 'sightseeing' ? formatDate(item.date) : (item.seq || '');
        const marker = L.marker(latlng, { icon: createMarkerIcon(item.category, label) })
          .addTo(map)
          .bindPopup(`<strong>${item.name}</strong><br>${item.address || ''}<br>${item.tel || ''}`);

        markers[item.category].push(marker);
        bounds.push(latlng);
      });

      if (bounds.length > 0) map.fitBounds(bounds, { padding: [30, 30] });
    }

    function parseGeoUrl(url) {
      let match = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
      if (match) return [parseFloat(match[1]), parseFloat(match[2])];
      match = url.match(/^\s*(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/);
      if (match) return [parseFloat(match[1]), parseFloat(match[2])];
      return null;
    }

    function renderTable(type) {
      const tbody = document.querySelector(`#${type}-table tbody`);
      const items = data[type].sort((a, b) => (a.seq || 0) - (b.seq || 0));

      if (items.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" class="empty-hint">尚無資料</td></tr>`;
        return;
      }

      tbody.innerHTML = items.map((item, idx) => `
        <tr>
          <td><input type="number" value="${item.seq || ''}" onchange="updateField('${type}', ${idx}, 'seq', this.value)" min="1"></td>
          <td><input type="date" value="${item.date || ''}" onchange="updateField('${type}', ${idx}, 'date', this.value)"></td>
          <td><input type="text" value="${item.name || ''}" placeholder="名稱" onchange="updateField('${type}', ${idx}, 'name', this.value)"></td>
          <td>
            <button class="btn btn-edit" onclick="openEditPage('${type}', ${idx})">編輯</button>
            <button class="btn btn-del" onclick="deleteRow('${type}', ${idx})">刪</button>
          </td>
        </tr>
      `).join('');
    }

    function addRow(type) {
      const maxSeq = data[type].length > 0 ? Math.max(...data[type].map(i => i.seq || 0)) : 0;
      data[type].push({ seq: maxSeq + 1, date: '', name: '', address: '', tel: '', cost: '', map_url: '', notes: '' });
      saveData();
      renderTable(type);
      updateMap();
    }

    function updateField(type, idx, field, value) {
      data[type][idx][field] = value;
      saveData();
      updateMap();
    }

    function deleteRow(type, idx) {
      data[type].splice(idx, 1);
      saveData();
      renderTable(type);
      updateMap();
    }

    function openEditPage(type, idx) {
      const item = data[type][idx];
      const params = new URLSearchParams({
        type: type,
        idx: idx,
        seq: item.seq || '',
        date: item.date || '',
        name: item.name || '',
        address: item.address || '',
        tel: item.tel || '',
        cost: item.cost || '',
        map_url: item.map_url || '',
        notes: item.notes || ''
      });
      window.location.href = 'edit.html?' + params.toString();
    }

    function exportJSON() {
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'travel_plan.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importJSON() {
      document.getElementById('importFile').click();
    }

    function handleImport(el) {
      const file = el.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);
          if (imported.sightseeing) data.sightseeing = imported.sightseeing;
          if (imported.hotel) data.hotel = imported.hotel;
          if (imported.transport) data.transport = imported.transport;
          saveData();
          renderTable('sightseeing');
          renderTable('hotel');
          renderTable('transport');
          updateMap();
        } catch (err) {
          alert('JSON 格式錯誤：' + err.message);
        }
      };
      reader.readAsText(file);
      el.value = '';
    }

    // Initialize
    loadData();
  </script>
</body>
</html>
